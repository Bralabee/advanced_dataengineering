version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5436:5436"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
  airflow-scheduler:
    image: apache/airflow:2.9.1
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    depends_on:
      - postgres
    entrypoint: ["/opt/airflow-init.sh"]
    command: ["airflow", "scheduler"]
    volumes:
      - ./airflow:/opt/airflow
      - ./airflow-init.sh:/opt/airflow-init.sh
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000" # Blob service
      - "10001:10001" # Queue service
      - "10002:10002" # Table service
    volumes:
      - ./azurite_data:/data
    command: "azurite-blob --blobHost 0.0.0.0 --location /data"
    profiles:
      - local

  airflow:
    image: apache/airflow:2.9.1
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    ports:
      - "8084:8084"
    depends_on:
      - postgres
    entrypoint: ["/opt/airflow-init.sh"]
    command: ["airflow", "webserver", "--port", "8084"]
    volumes:
      - ./airflow:/opt/airflow
      - ./airflow-init.sh:/opt/airflow-init.sh

  dbt:
    image: ghcr.io/dbt-labs/dbt-core:1.8.1
    volumes:
      - ./dbt:/usr/app
    working_dir: /usr/app
    command: ["--version"]

  ocr-gpu:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    profiles:
      - gpu

  ocr-cpu:
    build:
      context: ./ocr
      dockerfile: Dockerfile.cpu
    profiles:
      - cpu

  fabric:
    build:
      context: ./fabric
      dockerfile: Dockerfile
    environment:
      - CONDA_ENV_NAME=fabric
      # Azure credentials (set these in a .env file or your environment for security)
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_STORAGE_ACCOUNT_NAME=${AZURE_STORAGE_ACCOUNT_NAME}
      # Azurite local development
      - AZURITE_BLOB_ENDPOINT=http://azurite:10000/devstoreaccount1
      - AZURITE_ACCOUNT_NAME=devstoreaccount1
      - AZURITE_ACCOUNT_KEY=Eby8vdM02xNOcqFeqCnf2P==
    volumes:
      - ./fabric:/app
    profiles:
      - azure
