version: '3.8'
services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000" # Blob service
      - "10001:10001" # Queue service
      - "10002:10002" # Table service
    volumes:
      - ./azurite_data:/data
    command: "azurite-blob --blobHost 0.0.0.0 --location /data"

  airflow:
    image: quay.io/astronomer/astro-runtime:9.2.0
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./airflow/dags:/usr/local/airflow/dags
      - ./airflow/plugins:/usr/local/airflow/plugins
    ports:
      - "8084:8080"
    depends_on: []
    command: bash -c "airflow db init && airflow webserver"

  dbt:
    image: ghcr.io/dbt-labs/dbt-core:1.8.1
    volumes:
      - ./dbt:/usr/app
    working_dir: /usr/app
    command: ["--version"]

  ocr-gpu:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    profiles:
      - gpu

  ocr-cpu:
    build:
      context: ./ocr
      dockerfile: Dockerfile.cpu
    profiles:
      - cpu

  fabric:
    build:
      context: ./fabric
      dockerfile: Dockerfile
    environment:
      - CONDA_ENV_NAME=fabric
      # Azure credentials (set these in a .env file or your environment for security)
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_STORAGE_ACCOUNT_NAME=${AZURE_STORAGE_ACCOUNT_NAME}
      # Azurite local development
      - AZURITE_BLOB_ENDPOINT=http://azurite:10000/devstoreaccount1
      - AZURITE_ACCOUNT_NAME=devstoreaccount1
      - AZURITE_ACCOUNT_KEY=Eby8vdM02xNOcqFeqCnf2P==
    volumes:
      - ./fabric:/app
